<!DOCTYPE html>

<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vraag Flowchart</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: #0d0d0d;
font-family: ‘Nunito’, sans-serif;
display: flex;
justify-content: center;
align-items: flex-start;
min-height: 100vh;
padding: 40px 20px;
}

.canvas {
position: relative;
width: 560px;
}

/* ── SVG arrows layer ── */
svg.arrows {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
pointer-events: none;
overflow: visible;
}

/* ── nodes ── */
.node {
position: absolute;
border-radius: 14px;
border: 2px dashed;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
text-align: center;
padding: 12px 16px;
font-weight: 700;
font-size: 14px;
line-height: 1.3;
color: #fff;
gap: 6px;
}

.node .icon { font-size: 32px; }
.node .label { font-size: 13px; font-weight: 800; letter-spacing: 0.3px; }
.node .sublabel { font-size: 11px; font-weight: 600; opacity: 0.75; }

/* colour variants */
.node.start   { background: #1a1a2e; border-color: #00e5ff; box-shadow: 0 0 18px #00e5ff44; }
.node.diamond { background: #1a1a2e; border-color: #ff6b35; box-shadow: 0 0 18px #ff6b3544; border-radius: 0; transform: rotate(45deg); }
.node.diamond .inner { transform: rotate(-45deg); display:flex;flex-direction:column;align-items:center;gap:4px; }
.node.action  { background: #1a1a2e; border-color: #7bed9f; box-shadow: 0 0 18px #7bed9f33; }
.node.info    { background: #1a1a2e; border-color: #a29bfe; box-shadow: 0 0 18px #a29bfe33; }
.node.end-yes { background: #1a1a2e; border-color: #ffd32a; box-shadow: 0 0 18px #ffd32a44; }

/* arrow labels */
.arrow-label {
position: absolute;
font-family: ‘Nunito’, sans-serif;
font-size: 11px;
font-weight: 800;
padding: 2px 7px;
border-radius: 20px;
pointer-events: none;
}
.al-cyan  { background:#00e5ff22; color:#00e5ff; border:1px solid #00e5ff66; }
.al-red   { background:#ff6b3522; color:#ff6b35; border:1px solid #ff6b3566; }
.al-green { background:#7bed9f22; color:#7bed9f; border:1px solid #7bed9f66; }

/* title */
.chart-title {
color: #fff;
font-size: 22px;
font-weight: 800;
text-align: center;
margin-bottom: 20px;
letter-spacing: 0.5px;
text-shadow: 0 0 20px #00e5ff66;
}
</style>

</head>
<body>

<div>
  <div class="chart-title">Vraag Stellen Flowchart</div>

  <!-- The actual chart is rendered as SVG for precise control -->

  <svg width="560" height="860" viewBox="0 0 560 860" xmlns="http://www.w3.org/2000/svg" style="display:block;margin:0 auto;">
    <defs>
      <!-- Arrow markers -->
      <marker id="arr-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#00e5ff"/>
      </marker>
      <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b35"/>
      </marker>
      <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#7bed9f"/>
      </marker>
      <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#a29bfe"/>
      </marker>
      <marker id="arr-yellow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#ffd32a"/>
      </marker>

```
  <!-- Glow filters -->
  <filter id="glow-cyan">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-orange">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
