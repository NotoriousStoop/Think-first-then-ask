<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Think First. Then Ask AI.</title>
  <meta name="theme-color" content="#0a1f3d">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      background: url("IMG_6499.jpeg") no-repeat center center fixed;
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      text-align: center;
      color: white;

      opacity: 0;
      animation: fadeIn 1.4s ease-out forwards;
    }

    .overlay {
      background: rgba(0, 0, 0, 0.18);
      padding: 40px 60px;
      border-radius: 16px;
      backdrop-filter: blur(3px);
      transform: translateY(10px);
      animation: slideUp 1.2s ease-out forwards;
    }

    h1 {
      font-weight: 300;
      letter-spacing: 2px;
      font-size: clamp(28px, 4vw, 48px);
      margin: 0;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes slideUp {
      to { transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="overlay">
    <h1>Think First.<br>Then Ask AI.</h1>
  </div>
</body>
</html>
